<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>the cub labs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #faf8f5;
      color: #3a3a3a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      color: #c47a5a;
      margin-bottom: 0.5rem;
    }
    .tagline {
      font-size: 1rem;
      color: #888;
      margin-bottom: 3rem;
    }
    .app-card {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 2rem;
    }
    .app-name {
      font-size: 1.5rem;
      font-weight: 600;
      color: #c47a5a;
      margin-bottom: 0.5rem;
    }
    .app-desc {
      font-size: 0.95rem;
      color: #666;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .links a {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .links a:hover { opacity: 0.8; }
    .link-primary {
      background: #c47a5a;
      color: #fff;
    }
    .link-secondary {
      background: #f0ebe6;
      color: #c47a5a;
    }
    .contact {
      font-size: 0.85rem;
      color: #aaa;
      margin-top: 2rem;
    }
    .contact a {
      color: #c47a5a;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">the cub labs</div>
    <p class="tagline">Crafting apps with care</p>

    <div class="app-card">
      <div class="app-name">cromu</div>
      <p class="app-desc">
        The all-in-one crochet companion app. Track stitches, manage patterns,
        organize yarn info, and create pixel art designs.
      </p>
      <div class="links">
        <!-- <a href="#" class="link-primary">Google Play</a> -->
        <a href="privacy-policy.html" class="link-secondary">Privacy Policy</a>
      </div>
    </div>

    <p class="contact">
      Contact: <a href="mailto:thecublabs@gmail.com">thecublabs@gmail.com</a>
    </p>
  </div>
</body>
</html>
